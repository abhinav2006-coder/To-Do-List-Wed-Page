<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>To Do List</h1>
        </div>

        <div class="content">
            <div class="input-section">
                <input type="text" id="taskInput" placeholder="Enter a new task" id ="taskInput">
                <button id="addTaskButton">Add Task</button>
            </div>

            <div class="task-container">
                <h2>Task List</h2>
                
                <div class="task-list">
                    <ul id="taskList"></ul>
                </div>
                
            </div>
        </div>

        <div class="text-content">
            <p>
                Total Tasks: <span id="totalTasks">0</span> <br>
                Completed Tasks: <span id="completedTasks">0</span> |
                Uncompleted Tasks: <span id="uncompletedTasks">0</span>
            </p>
        </div>

    </div>

    <script src="./script.js"></script>

</body>

</html>
